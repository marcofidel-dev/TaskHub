version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: taskhub-postgres
    environment:
      POSTGRES_DB: taskhub_dev
      POSTGRES_USER: taskhub_user
      POSTGRES_PASSWORD: taskhub_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskhub_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
