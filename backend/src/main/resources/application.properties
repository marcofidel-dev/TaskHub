# Server
server.port=8081

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/taskhub_dev
spring.datasource.username=taskhub_user
spring.datasource.password=taskhub_dev_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
# Generate a secure Base64 secret: openssl rand -base64 64
jwt.secret=dGhpcy1pcy1hLXZlcnktc2VjdXJlLXNlY3JldC1rZXktZm9yLXRhc2todWItand0LWF1dGhlbnRpY2F0aW9u
jwt.expiration=86400000
jwt.access-token.expiration=900000
jwt.refresh-token.expiration=604800000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Rate Limiting (requests per minute per IP)
rate-limit.auth.capacity=10
rate-limit.auth.refill-per-minute=10
rate-limit.refresh.capacity=30
rate-limit.refresh.refill-per-minute=30
rate-limit.api.capacity=100
rate-limit.api.refill-per-minute=100
